name: "\U0001F41B Bug 报告 / Bug Report"
description: 报告一个 Bug / Report a bug
labels: ["bug"]
body:
  - type: input
    id: unity-version
    attributes:
      label: Unity 版本 / Unity Version
      description: >-
        当前官方维护基线为 Unity 2022.3+ / Unity 6+；若问题发生在更早版本，请明确说明。
        / The current supported baseline is Unity 2022.3+ / Unity 6+. If the issue occurs on an earlier version, please specify.
      placeholder: "e.g. 2022.3.20f1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Bug Description
      description: 清晰描述遇到的问题 / Clearly describe the issue you encountered
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误日志 / Error Logs
      description: 粘贴相关的 Console 日志 / Paste relevant Console logs
      render: shell

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 / Steps to Reproduce
      description: 如何复现这个问题？ / How to reproduce this issue?
      placeholder: |
        1. 打开 Unity 项目 / Open Unity project
        2. 执行 ... / Do ...
        3. 出现错误 / Error occurs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为 / Expected Behavior
      description: 你期望发生什么？ / What did you expect to happen?
